commit-msg:
  commands:
    conventional-commit:
      run: sh scripts/validate-commit-msg.sh {1}

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.go"
      run: golangci-lint run --path-prefix .
    fmt:
      glob: "*.go"
      run: gofumpt -w {staged_files} && goimports -w {staged_files}

pre-push:
  commands:
    rebase:
      run: sh scripts/rebase-workflow.sh develop
