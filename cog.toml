from_latest_tag = false
ignore_merge_commits = false
ignore_fixup_commits = false
disable_changelog = false
disable_bump_commit = false
generate_mono_repository_global_tag = true
generate_mono_repository_package_tags = true
branch_whitelist = ["main"]
tag_prefix = "v"
pre = "alpha.*"
skip_ci = "[skip ci]"
skip_untracked = false
pre_bump_hooks = ["sh ./scripts/bump-version.sh {{version}}"]
post_bump_hooks = ["git push", "git push origin {{version_tag}}", "sh ./scripts/create-github-release.sh {{version_tag}}"]
pre_package_bump_hooks = []
post_package_bump_hooks = []

[git_hooks]

[commit_types]

[changelog]
path = "CHANGELOG.md"
template = "remote"
remote = "github.com"
owner = "zenkiet"
repository = "angular-codebase-rag"

[[changelog.authors]]
signature = "Kiet Le <kietgolx65234@gmail.com>"
username = "zenkiet"

[bump_profiles]
